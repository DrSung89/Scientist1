<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Dilution Calculator | Scientist's Toolkit</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "surface-container-lowest": "#ffffff",
              "primary": "#0059bb",
              "on-primary": "#ffffff",
              "background": "#f8f9fa",
              "on-background": "#191c1d",
              "outline-variant": "#c1c6d7",
              "primary-fixed": "#d8e2ff",
              "on-primary-fixed-variant": "#004493",
            },
            fontFamily: { "headline": ["Space Grotesk"], "body": ["Inter"] },
          },
        },
      }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .lab-grid { background-image: radial-gradient(circle, #c1c6d7 1px, transparent 1px); background-size: 24px 24px; opacity: 0.15; }
    </style>
</head>
<body class="bg-surface font-body text-on-surface flex flex-col min-h-screen">

    <nav class="fixed top-0 w-full z-50 bg-slate-50/90 backdrop-blur-md border-b border-slate-200/50 shadow-sm px-6 py-3 flex justify-between items-center">
        <a href="../" class="text-xl font-bold tracking-tighter text-slate-900 font-headline">Scientist's Toolkit</a>
        <a href="../help/" class="p-2 text-slate-500"><span class="material-symbols-outlined">help</span></a>
    </nav>

    <main class="relative pt-24 flex-grow">
        <div class="fixed inset-0 lab-grid pointer-events-none z-0"></div>

        <section class="relative px-6 py-12 max-w-screen-md mx-auto z-10 text-center">
            <h1 class="text-5xl font-headline font-bold text-on-surface tracking-tighter mb-4">Dilution Calculator</h1>
            <p class="text-lg text-on-surface-variant font-light mb-4">Enter 3 values to calculate the 4th unknown variable.</p>
        </section>

        <section class="px-6 pb-20 max-w-screen-md mx-auto z-10 relative">
            <div class="bg-surface-container-lowest p-6 md:p-8 rounded-xl shadow-sm border border-outline-variant/30">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 text-left">
                    <div>
                        <label class="block font-headline text-sm font-bold mb-2">Stock Conc. (C₁)</label>
                        <div class="flex">
                            <input type="number" id="m1" placeholder="..." class="w-full p-3 bg-white border border-outline-variant/50 rounded-l-lg outline-none focus:ring-2 focus:ring-primary">
                            <select id="m1-unit" class="p-3 bg-slate-100 border border-l-0 border-outline-variant/50 rounded-r-lg font-bold">
                                <option value="M">M</option><option value="mM">mM</option><option value="uM">µM</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block font-headline text-sm font-bold mb-2">Stock Vol. (V₁)</label>
                        <div class="flex">
                            <input type="number" id="v1" placeholder="..." class="w-full p-3 bg-white border border-outline-variant/50 rounded-l-lg outline-none focus:ring-2 focus:ring-primary">
                            <select id="v1-unit" class="p-3 bg-slate-100 border border-l-0 border-outline-variant/50 rounded-r-lg font-bold">
                                <option value="L">L</option><option value="mL" selected>mL</option><option value="uL">µL</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block font-headline text-sm font-bold mb-2">Target Conc. (C₂)</label>
                        <div class="flex">
                            <input type="number" id="m2" placeholder="..." class="w-full p-3 bg-white border border-outline-variant/50 rounded-l-lg outline-none focus:ring-2 focus:ring-primary">
                            <select id="m2-unit" class="p-3 bg-slate-100 border border-l-0 border-outline-variant/50 rounded-r-lg font-bold">
                                <option value="M">M</option><option value="mM" selected>mM</option><option value="uM">µM</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block font-headline text-sm font-bold mb-2">Target Vol. (V₂)</label>
                        <div class="flex">
                            <input type="number" id="v2" placeholder="..." class="w-full p-3 bg-white border border-outline-variant/50 rounded-l-lg outline-none focus:ring-2 focus:ring-primary">
                            <select id="v2-unit" class="p-3 bg-slate-100 border border-l-0 border-outline-variant/50 rounded-r-lg font-bold">
                                <option value="L">L</option><option value="mL" selected>mL</option><option value="uL">µL</option>
                            </select>
                        </div>
                    </div>
                </div>

                <button id="calculate-dilution" class="w-full bg-primary text-on-primary font-headline font-bold py-4 rounded-lg shadow-sm hover:opacity-90 flex items-center justify-center gap-2 text-lg">
                    <span class="material-symbols-outlined">science</span> Calculate
                </button>

                <div id="dilution-result" class="mt-6 bg-primary-fixed/30 border border-primary-fixed p-6 rounded-lg text-center text-xl text-on-primary-fixed-variant font-headline font-bold hidden">
                </div>
            </div>
        </section>
    </main>

    <footer class="w-full p-8 border-t border-outline-variant/30 bg-slate-50 text-center text-xs text-slate-400">
        © 2026 Scientist's Toolkit.
    </footer>

    <script src="../assets/main.js"></script>
</body>
</html>
